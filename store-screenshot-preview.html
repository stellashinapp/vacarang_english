<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>스토어 스크린샷 미리보기</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; padding: 20px; background: #1a1a2e; color: #eee; min-height: 100vh; }
    h1 { font-size: 1.2rem; margin-bottom: 16px; }
    .upload { margin-bottom: 24px; }
    .upload label { display: inline-block; padding: 10px 20px; background: #4361ee; color: white; border-radius: 8px; cursor: pointer; }
    .upload input { display: none; }
    .phone-frame { width: 280px; aspect-ratio: 9/16; margin: 0 auto 24px; border-radius: 28px; padding: 12px; background: #222; box-shadow: 0 0 0 3px #444; overflow: hidden; }
    .phone-frame img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .grid { display: flex; flex-wrap: wrap; gap: 24px; justify-content: center; }
    .card { text-align: center; }
    .card span { font-size: 12px; color: #888; display: block; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>📱 스토어 스크린샷 미리보기 (9:16)</h1>
  <div class="upload">
    <label for="files">스크린샷 선택 (2장 이상)</label>
    <input type="file" id="files" accept="image/*" multiple>
  </div>
  <div id="preview" class="grid"></div>

  <script>
    document.getElementById('files').onchange = function(e) {
      var files = e.target.files;
      var preview = document.getElementById('preview');
      preview.innerHTML = '';
      for (var i = 0; i < files.length; i++) {
        var f = files[i];
        var card = document.createElement('div');
        card.className = 'card';
        var frame = document.createElement('div');
        frame.className = 'phone-frame';
        var img = document.createElement('img');
        img.src = URL.createObjectURL(f);
        img.alt = f.name;
        frame.appendChild(img);
        var label = document.createElement('span');
        label.textContent = (i + 1) + '. ' + f.name;
        card.appendChild(frame);
        card.appendChild(label);
        preview.appendChild(card);
      }
    };
  </script>
</body>
</html>
